name: Update packages

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-packages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Fetch package manifests and compute hashes
        id: update
        run: |
          set -euo pipefail
          CLI_MANIFEST_BASE="https://antigravity-cli-auto-updater-974169037036.us-central1.run.app/manifests"

          CLI_M_X64=$(curl -fsSL "$CLI_MANIFEST_BASE/linux_amd64.json")
          CLI_VERSION=$(echo "$CLI_M_X64" | jq -r '.version')
          CLI_URL_X64=$(echo "$CLI_M_X64" | jq -r '.url')
          CLI_HASH_X64=$(nix store prefetch-file --json "$CLI_URL_X64" 2>/dev/null | jq -r '.hash')

          CLI_M_ARM=$(curl -fsSL "$CLI_MANIFEST_BASE/linux_arm64.json")
          CLI_URL_ARM=$(echo "$CLI_M_ARM" | jq -r '.url')
          CLI_HASH_ARM=$(nix store prefetch-file --json "$CLI_URL_ARM" 2>/dev/null | jq -r '.hash')

          DESKTOP_RELEASE=$(curl -fsSL "https://antigravity-auto-updater-974169037036.us-central1.run.app/releases" \
            | jq -r '[.[] | select(.version | startswith("2."))][0]')
          DESKTOP_VERSION=$(echo "$DESKTOP_RELEASE" | jq -r '.version')
          DESKTOP_EXECUTION_ID=$(echo "$DESKTOP_RELEASE" | jq -r '.execution_id')
          DESKTOP_BASE="https://storage.googleapis.com/antigravity-public/antigravity-hub/${DESKTOP_VERSION}-${DESKTOP_EXECUTION_ID}"

          DESKTOP_M_X64=$(curl -fsSL "$DESKTOP_BASE/linux-x64/manifest.json")
          DESKTOP_URL_X64=$(echo "$DESKTOP_M_X64" | jq -r '.url')
          DESKTOP_HASH_X64=$(nix hash convert --hash-algo sha256 --from base16 --to sri "$(echo "$DESKTOP_M_X64" | jq -r '.sha256hash')")

          DESKTOP_M_ARM=$(curl -fsSL "$DESKTOP_BASE/linux-arm/manifest.json")
          DESKTOP_URL_ARM=$(echo "$DESKTOP_M_ARM" | jq -r '.url')
          DESKTOP_HASH_ARM=$(nix hash convert --hash-algo sha256 --from base16 --to sri "$(echo "$DESKTOP_M_ARM" | jq -r '.sha256hash')")

          echo "cli_version=$CLI_VERSION"             >> "$GITHUB_OUTPUT"
          echo "cli_url_x64=$CLI_URL_X64"             >> "$GITHUB_OUTPUT"
          echo "cli_hash_x64=$CLI_HASH_X64"           >> "$GITHUB_OUTPUT"
          echo "cli_url_arm=$CLI_URL_ARM"             >> "$GITHUB_OUTPUT"
          echo "cli_hash_arm=$CLI_HASH_ARM"           >> "$GITHUB_OUTPUT"
          echo "desktop_version=$DESKTOP_VERSION"     >> "$GITHUB_OUTPUT"
          echo "desktop_url_x64=$DESKTOP_URL_X64"     >> "$GITHUB_OUTPUT"
          echo "desktop_hash_x64=$DESKTOP_HASH_X64"   >> "$GITHUB_OUTPUT"
          echo "desktop_url_arm=$DESKTOP_URL_ARM"     >> "$GITHUB_OUTPUT"
          echo "desktop_hash_arm=$DESKTOP_HASH_ARM"   >> "$GITHUB_OUTPUT"

      - name: Patch flake.nix
        run: |
          python3 - <<'EOF'
          import os
          import re
          from pathlib import Path

          flake = Path("flake.nix")
          content = flake.read_text()

          cli_version  = os.environ["CLI_VERSION"]
          cli_url_x64  = os.environ["CLI_URL_X64"]
          cli_hash_x64 = os.environ["CLI_HASH_X64"]
          cli_url_arm  = os.environ["CLI_URL_ARM"]
          cli_hash_arm = os.environ["CLI_HASH_ARM"]
          desktop_version  = os.environ["DESKTOP_VERSION"]
          desktop_url_x64  = os.environ["DESKTOP_URL_X64"]
          desktop_hash_x64 = os.environ["DESKTOP_HASH_X64"]
          desktop_url_arm  = os.environ["DESKTOP_URL_ARM"]
          desktop_hash_arm = os.environ["DESKTOP_HASH_ARM"]

          content, version_count = re.subn(
              r'(pname = "antigravity-cli";\s+version = ")[^"]+(")',
              rf'\g<1>{cli_version}\2', content)
          if version_count != 1:
              raise SystemExit(f"expected to update exactly one CLI version, updated {version_count}")

          content, version_count = re.subn(
              r'(pname = "antigravity-desktop";\s+version = ")[^"]+(")',
              rf'\g<1>{desktop_version}\2', content)
          if version_count != 1:
              raise SystemExit(f"expected to update exactly one desktop version, updated {version_count}")

          def patch_sources(source_name, package_name, next_marker, replacements):
              start = content.index(f"          {source_name} = {{")
              end = content.index(next_marker, start)
              srcs = content[start:end]

              for arch, url, sha256 in replacements:
                  srcs = patch_arch(srcs, arch, url, sha256, package_name)

              return content[:start] + srcs + content[end:]

          def patch_arch(srcs, arch, url, sha256, package_name):
              pattern = rf'({arch} = \{{\s+url = ")[^"]+(";\s+hash = ")[^"]+(")'
              updated, count = re.subn(pattern, rf'\g<1>{url}\2{sha256}\3', srcs)
              if count != 1:
                  raise SystemExit(f"expected to update exactly one {arch} {package_name} source, updated {count}")
              return updated

          content = patch_sources("cliSrcs", "CLI", "\n          };\n\n          antigravity-cli", [
              ("x86_64-linux", cli_url_x64, cli_hash_x64),
              ("aarch64-linux", cli_url_arm, cli_hash_arm),
          ])
          content = patch_sources("desktopSrcs", "desktop", "\n          };\n\n          antigravity-desktop", [
              ("x86_64-linux", desktop_url_x64, desktop_hash_x64),
              ("aarch64-linux", desktop_url_arm, desktop_hash_arm),
          ])

          flake.write_text(content)
          print(f"Updated CLI to {cli_version} and desktop to {desktop_version}")
          EOF
        env:
          CLI_VERSION:     ${{ steps.update.outputs.cli_version }}
          CLI_URL_X64:     ${{ steps.update.outputs.cli_url_x64 }}
          CLI_HASH_X64:    ${{ steps.update.outputs.cli_hash_x64 }}
          CLI_URL_ARM:     ${{ steps.update.outputs.cli_url_arm }}
          CLI_HASH_ARM:    ${{ steps.update.outputs.cli_hash_arm }}
          DESKTOP_VERSION:  ${{ steps.update.outputs.desktop_version }}
          DESKTOP_URL_X64:  ${{ steps.update.outputs.desktop_url_x64 }}
          DESKTOP_HASH_X64: ${{ steps.update.outputs.desktop_hash_x64 }}
          DESKTOP_URL_ARM:  ${{ steps.update.outputs.desktop_url_arm }}
          DESKTOP_HASH_ARM: ${{ steps.update.outputs.desktop_hash_arm }}

      - name: Update flake.lock
        run: nix flake update

      - name: Open PR if anything changed
        id: cpr
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update Antigravity packages"
          title: "chore: update Antigravity packages"
          body: |
            Automated version bump for Antigravity packages.

            | | Value |
            |---|---|
            | **CLI version** | `${{ steps.update.outputs.cli_version }}` |
            | **CLI x86_64 URL** | `${{ steps.update.outputs.cli_url_x64 }}` |
            | **CLI aarch64 URL** | `${{ steps.update.outputs.cli_url_arm }}` |
            | **Desktop version** | `${{ steps.update.outputs.desktop_version }}` |
            | **Desktop x86_64 URL** | `${{ steps.update.outputs.desktop_url_x64 }}` |
            | **Desktop aarch64 URL** | `${{ steps.update.outputs.desktop_url_arm }}` |
          branch: "auto-update/packages"
          delete-branch: true

      - name: Enable Pull Request Automerge
        if: steps.cpr.outputs.pull-request-operation == 'created'
        run: |
          gh pr merge --auto --squash "${{ steps.cpr.outputs.pull-request-number }}" || \
          gh pr merge --squash "${{ steps.cpr.outputs.pull-request-number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
