name: Update packages

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            accept-flake-config = true

      - name: Fetch CLI manifests and compute hashes
        id: update
        run: |
          set -euo pipefail
          MANIFEST_BASE="https://antigravity-cli-auto-updater-974169037036.us-central1.run.app/manifests"

          M_X64=$(curl -fsSL "$MANIFEST_BASE/linux_amd64.json")
          VERSION=$(echo "$M_X64" | jq -r '.version')
          URL_X64=$(echo "$M_X64" | jq -r '.url')
          HASH_X64=$(nix store prefetch-file --json "$URL_X64" 2>/dev/null | jq -r '.hash')

          M_ARM=$(curl -fsSL "$MANIFEST_BASE/linux_arm64.json")
          URL_ARM=$(echo "$M_ARM" | jq -r '.url')
          HASH_ARM=$(nix store prefetch-file --json "$URL_ARM" 2>/dev/null | jq -r '.hash')

          echo "version=$VERSION"   >> "$GITHUB_OUTPUT"
          echo "url_x64=$URL_X64"   >> "$GITHUB_OUTPUT"
          echo "hash_x64=$HASH_X64" >> "$GITHUB_OUTPUT"
          echo "url_arm=$URL_ARM"   >> "$GITHUB_OUTPUT"
          echo "hash_arm=$HASH_ARM" >> "$GITHUB_OUTPUT"

      - name: Patch flake.nix
        run: |
          python3 - <<'EOF'
          import os
          import re
          from pathlib import Path

          flake = Path("flake.nix")
          content = flake.read_text()

          version  = os.environ["VERSION"]
          url_x64  = os.environ["URL_X64"]
          hash_x64 = os.environ["HASH_X64"]
          url_arm  = os.environ["URL_ARM"]
          hash_arm = os.environ["HASH_ARM"]

          content, version_count = re.subn(
              r'(pname = "antigravity-cli";\s+version = ")[^"]+(")',
              rf'\g<1>{version}\2', content)
          if version_count != 1:
              raise SystemExit(f"expected to update exactly one CLI version, updated {version_count}")

          # Only patch cliSrcs. The flake also contains desktopSrcs blocks with
          # the same architecture keys, so repo-wide substitutions can corrupt
          # the desktop package by replacing its URLs/hashes with CLI values.
          start = content.index("          cliSrcs = {")
          end = content.index("\n          };\n\n          antigravity-cli", start)
          cli_srcs = content[start:end]

          def patch_arch(srcs, arch, url, sha256):
              pattern = rf'({arch} = \{{\s+url = ")[^"]+(";\s+hash = ")[^"]+(")'
              updated, count = re.subn(pattern, rf'\g<1>{url}\2{sha256}\3', srcs)
              if count != 1:
                  raise SystemExit(f"expected to update exactly one {arch} CLI source, updated {count}")
              return updated

          cli_srcs = patch_arch(cli_srcs, "x86_64-linux", url_x64, hash_x64)
          cli_srcs = patch_arch(cli_srcs, "aarch64-linux", url_arm, hash_arm)
          content = content[:start] + cli_srcs + content[end:]

          flake.write_text(content)
          print(f"Updated CLI to {version}")
          EOF
        env:
          VERSION:  ${{ steps.update.outputs.version }}
          URL_X64:  ${{ steps.update.outputs.url_x64 }}
          HASH_X64: ${{ steps.update.outputs.hash_x64 }}
          URL_ARM:  ${{ steps.update.outputs.url_arm }}
          HASH_ARM: ${{ steps.update.outputs.hash_arm }}

      - name: Update flake.lock
        run: nix flake update

      - name: Open PR if anything changed
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update antigravity-cli to ${{ steps.update.outputs.version }}"
          title: "chore: update antigravity-cli to ${{ steps.update.outputs.version }}"
          body: |
            Automated version bump for `antigravity-cli`.

            | | Value |
            |---|---|
            | **Version** | `${{ steps.update.outputs.version }}` |
            | **x86_64 URL** | `${{ steps.update.outputs.url_x64 }}` |
            | **aarch64 URL** | `${{ steps.update.outputs.url_arm }}` |
          branch: "auto-update/cli-${{ steps.update.outputs.version }}"
          delete-branch: true
